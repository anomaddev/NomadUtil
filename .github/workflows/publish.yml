# Publishes nomadutil to npm via OIDC Trusted Publishing (no npm token secret).
#
# Triggers on a pushed tag matching v*.*.* (e.g. after `nomadutil git release 1.0.7`).
#
# One-time setup on npmjs.com:
# 1. Package → Access → Trusted Publishers → GitHub Actions
# 2. Organization or user: anomaddev
# 3. Repository: NomadUtil
# 4. Workflow filename: publish.yml
# 5. Environment: (leave blank)
# 6. Allowed actions: npm publish
#
# Note: --provenance requires a public GitHub repo. This repo is private, so
# provenance is omitted. Trusted Publishing (OIDC) still works.

name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
